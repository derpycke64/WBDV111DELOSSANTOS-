<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Join Rye Fitness</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script type="module" src="./auth/main.js"></script>
    
</head>
<body>

<nav class="Navbar">
    <div class="Gym">
        <div class="Gym-logo">
            <a href="index.html"><img src="images/Logo.jpg" alt="Logo" width="60"></a>
        </div>
        <div class="Gym-text">
            <div class="Gym-title">Rye Fitness</div>
            <div class="Gym-subtitle">Center</div>
        </div>
    </div>
    <div class="Navbar-links">
        <a class="Navbar-link" href="Aboutus.html">Why Join?</a>
        <a class="Navbar-link" href="Training.html">Get Started</a>
        <a class="Navbar-link" href="Shop.html">Merchandise</a>
    </div>
    <div class="Rightnav-buttons">
        <a class="Rbutton-link" href="Login.html">JOIN NOW</a>
        <a class="Rbutton-link" href="Membership.html">TRY US</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-form-wrapper">

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('register')">Create Account</button>
                <button class="auth-tab" onclick="switchTab('login')">Log In</button>
            </div>

            <!-- REGISTER FORM -->
            <form class="auth-form active" id="register-form" onsubmit="doRegister(event)">
                <h1 class="auth-title">Join Rye Fitness</h1>
                <p class="auth-subtitle">Create your account and start your transformation</p>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-first">First Name</label>
                        <input type="text" id="reg-first" placeholder="John" required />
                    </div>
                    <div class="form-group">
                        <label for="reg-last">Last Name</label>
                        <input type="text" id="reg-last" placeholder="Doe" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="john.doe@example.com" required />
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="(555) 123-4567" required />
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Create a strong password" required />
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="Re-enter your password" required />
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="reg-terms" required />
                        I agree to the Terms of Service
                    </label>
                </div>
                <button type="submit" class="auth-submit-btn">Create Account</button>
                <p class="auth-switch">Already have an account? <a href="#" onclick="switchTab('login')">Log in here</a></p>
            </form>
            <div class="quick-login">
                    <a href="Admin.html"><button class="quick-btn">ADMIN</button></a>
                    <a href="User.html"><button class="quick-btn">USER</button></a>
                </div>

            <!-- LOGIN FORM -->
            <form class="auth-form" id="login-form" onsubmit="doLogin(event)">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Log in to your account</p>

                <div class="form-group">
                    <label for="login-username">Email Address</label>
                    <input type="email" id="login-username" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required />
                </div>
                <button type="submit" class="auth-submit-btn">Log In</button>
                <p class="auth-switch">Don't have an account? <a href="#" onclick="switchTab('register')">Sign up here</a></p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
