<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Rye Fitness Gym RF</title>
</head>
<body>
     <div class="Full-section">
        <nav class="Navbar">
            <div class="Gym">
                <div class="Gym-logo">
                    <img src="../images/Logo.jpg" alt="Logo" width="100">
                </div>
                <div class="Gym-text">
                    <div class="Gym-title">Rye Fitness</div>
                    <div class="Gym-subtitle">Center</div>
                </div>
            </div>

            <div class="Navbar-links">
                <a class="Navbar-link" href="index.html">Why Join?</a>
                <a class="Navbar-link" href="Community.html">Community</a>
                <a class="Navbar-link" href="Training.html">Get Started</a>
                <a class="Navbar-link" href="Shop.html">Merchandise</a>
            </div>

            <div class="Rightnav-buttons">
                <a class="Rbutton-link" href="Register.html">JOIN NOW</a>
                <a class="Rbutton-link" href="Training.html">TRY US</a>
            </div>
        </nav>
        <div class="auth-page">
      <div class="auth-container">
        <div class="auth-form-wrapper">
          <h1 class="auth-title">Join Rye Fitness</h1>
          <p class="auth-subtitle">Create your account and start your transformation</p>

          <form class="auth-form">
            <div class="form-row">
              <div class="form-group">
                <label for="first">First Name</label>
                <input
                  type="text"
                  id="first"
                  name="firstName"
                  placeholder="John"
                  required
                />
              </div>

              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input
                  type="text"
                  id="lastName"
                  name="lastName"
                  placeholder="Doe"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="john.doe@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="(555) 123-4567"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a strong password"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Re-enter your password"
                required
              />
            </div>

            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" required />
                I agree to the Terms of Service and Privacy Policy
              </label>
            </div>

            <button type="submit" class="auth-submit-btn">Create Account</button>
          </form>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <p class="auth-switch">
            Already have an account? <a href="Membership.html">Log in here</a>
          </p>
        </div>

        <div class="auth-image">
          <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600&h=800&fit=crop" alt="Gym" />
          <div class="auth-image-overlay">
            <h2>Begin Your Transformation</h2>
            <p>Join our community of fitness enthusiasts</p>
          </div>
        </div>
      </div>
    </div>
    </div>
</body>

</html>
