<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Rye Fitness Gym RF</title>
</head>
<body>
     <div class="Full-section">
        <nav class="Navbar">
            <div class="Gym">
                <div class="Gym-logo">
                    <img src="../images/Logo.jpg" alt="Logo" width="100">
                </div>
                <div class="Gym-text">
                    <div class="Gym-title">Rye Fitness</div>
                    <div class="Gym-subtitle">Center</div>
                </div>
            </div>

            <div class="Navbar-links">
                <a class="Navbar-link" href="index.html">Why Join?</a>
                <a class="Navbar-link" href="Community.html">Community</a>
                <a class="Navbar-link" href="Training.html">Get Started</a>
                <a class="Navbar-link" href="Shop.html">Merchandise</a>
            </div>

            <div class="Rightnav-buttons">
                <a class="Rbutton-link" href="Register.html">JOIN NOW</a>
                <a class="Rbutton-link" href="Training.html">TRY US</a>
            </div>
        </nav>
        <div class="merchandise-page">
      <section class="merch-hero">
        <h1 class="page-title">Merchandise</h1>
        <p class="page-subtitle">Gear up with Rye Fitness official products</p>
      </section>

      <section class="merch-content">
        <div class="filter-section">
          <h3>Filter by Category</h3>
          <div class="filter-buttons">
            <button class="filter-btn active">All Products</button>
            <button class="filter-btn">Apparel</button>
            <button class="filter-btn">Accessories</button>
            <button class="filter-btn">Equipment</button>
          </div>
        </div>

        <div class="products-grid">
          <div class="product-card">
            <div class="product-image">
              <img src="https://images.unsplash.com/photo-1523438097911-512782516f69?w=400&h=300&fit=crop" alt="Gym Apparel" />
            </div>
            <div class="product-info">
              <h3>Rye Fitness T-Shirt</h3>
              <p class="product-price">$29.99</p>
              <button class="add-to-cart-btn">Add to Cart</button>
            </div>
          </div>
          
          <div class="product-card">
            <div class="product-image">
              <img src="https://images.unsplash.com/photo-1572521335131-5b6b9d32b966?w=400&h=300&fit=crop" alt="Water Bottle" />
            </div>
            <div class="product-info">
              <h3>Sports Water Bottle</h3>
              <p class="product-price">$24.99</p>
              <button class="add-to-cart-btn">Add to Cart</button>
            </div>
          </div>

          <div class="product-card">
            <div class="product-image">
              <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=400&h=300&fit=crop" alt="Gym Bag" />
            </div>
            <div class="product-info">
              <h3>Gym Duffel Bag</h3>
              <p class="product-price">$49.99</p>
              <button class="add-to-cart-btn">Add to Cart</button>
            </div>
          </div>

          <div class="product-card">
            <div class="product-image">
              <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=400&h=300&fit=crop" alt="Resistance Bands" />
            </div>
            <div class="product-info">
              <h3>Resistance Bands Set</h3>
              <p class="product-price">$34.99</p>
              <button class="add-to-cart-btn">Add to Cart</button>
            </div>
          </div>
        </div>
      </section>
    </div>
    </div>
</body>

</html>
